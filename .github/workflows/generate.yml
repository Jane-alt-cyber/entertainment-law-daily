name: Generate Daily Lesson

on:
  schedule:
    # UTC 23:00 Sun–Thu = Beijing 07:00 Mon–Fri
    # Weekends are auto-skipped inside generate.py
    - cron: '0 23 * * 0-4'
  workflow_dispatch:
    inputs:
      override_date:
        description: 'Override today date (YYYY-MM-DD) for manual testing'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate lesson + audio
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OVERRIDE_DATE: ${{ github.event.inputs.override_date }}
        run: python scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "No new content to commit (weekend or pre-start date)."
          else
            WEEK="${LESSON_WEEK:-?}"
            DAY="${LESSON_DAY:-?}"
            TOPIC="${LESSON_TOPIC:-update}"
            git commit -m "📚 W${WEEK}D${DAY}: ${TOPIC}"
            git push
            echo "Committed and pushed successfully."
          fi
