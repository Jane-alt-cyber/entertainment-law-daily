name: Generate Daily Lesson

on:
  schedule:
    # UTC 23:00 Sun–Thu = Beijing 07:00 Mon–Fri
    # Weekends are auto-skipped inside generate.py
    - cron: '0 23 * * 0-4'
  workflow_dispatch:
    inputs:
      override_date:
        description: |
          指定生成哪天的内容（YYYY-MM-DD）。
          例：明天 2026-03-25 → 生成 Day 2；留空 = 今天。
          注意：脚本根据此日期计算是第几周第几天。
        required: false
        default: ''
      force_regenerate:
        description: '强制重新生成（覆盖已有内容）。填 1 开启，留空跳过已有内容。'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate lesson + audio
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OVERRIDE_DATE: ${{ github.event.inputs.override_date }}
          # Manual runs (workflow_dispatch) always overwrite; scheduled runs skip existing.
          FORCE_REGENERATE: ${{ github.event_name == 'workflow_dispatch' && '1' || github.event.inputs.force_regenerate }}
        run: python scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new content to commit (skipped or already exists)."
          else
            WEEK="${LESSON_WEEK:-?}"
            DAY="${LESSON_DAY:-?}"
            TOPIC="${LESSON_TOPIC:-update}"
            git commit -m "📚 W${WEEK}D${DAY}: ${TOPIC}"
            git push
            echo "Committed and pushed successfully."
          fi
